<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clusters Map</title>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #hint { position: absolute; top: 8px; left: 8px; z-index: 10; background: rgba(0,0,0,0.6); color: #fff; border-radius: 6px; padding: 6px 8px; }
    </style>
</head>
<body>
<div id="hint">Map loaded in fallback marker mode</div>
<div id="map"></div>
<script>
    let map;
    const markers = new Map();
    let infoWindow;

    function setConfig(apiKey) {
        if (!apiKey) return;
        const script = document.createElement("script");
        script.src = "https://maps.googleapis.com/maps/api/js?key=" + encodeURIComponent(apiKey) + "&callback=init";
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
    }

    function init() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 24.8607, lng: 67.0011 },
            zoom: 11
        });
        infoWindow = new google.maps.InfoWindow();
    }

    function ensureMap() {
        // Handled by setConfig callback
    }

    function colorForScore(score) {
        if (score >= 75) return "green";
        if (score >= 50) return "yellow";
        return "red";
    }

    function loadClusters(clusters) {
        if (!map) {
            // If map not ready, retry in 500ms
            setTimeout(() => loadClusters(clusters), 500);
            return;
        }
        markers.forEach(marker => marker.setMap(null));
        markers.clear();
        
        if (clusters.length === 0) return;
        
        const bounds = new google.maps.LatLngBounds();
        clusters.forEach(cluster => {
            const loc = new google.maps.LatLng(cluster.lat, cluster.lng);
            bounds.extend(loc);
            
            const marker = new google.maps.Marker({
                map: map,
                position: loc,
                title: cluster.locality,
                icon: "http://maps.google.com/mapfiles/ms/icons/" + colorForScore(cluster.score) + "-dot.png"
            });
            marker.addListener("click", () => {
                infoWindow.setContent(`<strong>${cluster.locality}</strong><br/>Score: ${cluster.score}`);
                infoWindow.open(map, marker);
                if (window.javaClusterBridge && window.javaClusterBridge.onClusterMarkerClick) {
                    window.javaClusterBridge.onClusterMarkerClick(cluster.locality);
                }
            });
            markers.set(cluster.locality, marker);
        });
        
        google.maps.event.addListenerOnce(map, 'bounds_changed', function() {
            if (this.getZoom() > 14) this.setZoom(14);
        });
        map.fitBounds(bounds);
    }

    function highlightCluster(locality) {
        const marker = markers.get(locality);
        if (!marker) return;
        map.panTo(marker.getPosition());
        map.setZoom(13);
        marker.setAnimation(google.maps.Animation.BOUNCE);
        setTimeout(() => marker.setAnimation(null), 800);
    }
</script>
</body>
</html>
